<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HiBREW | 咖喜萃 - 曾秋平 Kenny ZENG</title>
    <style>
        :root {
            --brand-red: #B51C28;
            --dark-grey: #333333;
            --light-grey: #666666;
            --bg-color: #F4F4F7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark-grey);
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            text-align: center;
        }

        .logo-section {
            margin-bottom: 24px;
        }

        .brand-name {
            font-size: 24px;
            font-weight: 800;
            color: var(--brand-red);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .user-info h1 {
            font-size: 22px;
            margin: 0;
            font-weight: 600;
        }

        .user-info p {
            font-size: 14px;
            color: var(--light-grey);
            margin: 8px 0 32px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            display: block;
            padding: 18px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: transform 0.1s, opacity 0.2s;
            border: none;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: var(--brand-red);
            color: #ffffff;
        }

        .btn-secondary {
            background-color: #ffffff;
            color: var(--brand-red);
            border: 2px solid var(--brand-red);
        }

        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #bbbbbb;
        }

        /* Toast message style */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 50px;
            padding: 12px;
            position: fixed;
            z-index: 1;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-section">
            <div class="brand-name">HiBREW | 咖喜萃</div>
        </div>

        <div class="user-info">
            <h1>曾秋平 Kenny ZENG</h1>
            <p>创始人 / CEO</p>
        </div>

        <div class="links">
            <button class="btn btn-primary" onclick="handleWechat('18924821068', 'zh')">
                添加微信 (WeChat)
            </button>
            
            <button class="btn btn-primary" onclick="handleWechat('18924821068', 'en')">
                Add WeChat (Global)
            </button>

            <a href="https://www.hibrew.com" target="_blank" class="btn btn-secondary">
                访问官方网站
            </a>
        </div>

        <div class="footer">
            Foshan Shunde Bene Appliance Tech Co., Ltd
        </div>
    </div>

    <div id="toast"></div>

    <script>
        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.innerText = msg;
            toast.className = "toast show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        function handleWechat(phone, lang) {
            // Copy to clipboard
            const el = document.createElement('textarea');
            el.value = phone;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const msg = lang === 'zh' 
                ? "号码已复制！正在打开微信，请粘贴搜索" 
                : "Number copied! Opening WeChat, please paste to search.";
            
            showToast(msg);

            // Attempt to open WeChat after short delay
            setTimeout(() => {
                window.location.href = "weixin://";
            }, 1200);
        }
    </script>
</body>
</html>
